#
# prj.conf — Kconfig feature configuration for the phone firmware
#
# This file uses Kconfig syntax (same as the Linux kernel) to enable
# or disable Zephyr subsystems. Each CONFIG_X=y line turns on a feature;
# the build system pulls in only the code for enabled features.
#
# The board's own defconfig (nucleo_h753zi_defconfig) provides defaults.
# This file overrides or supplements those defaults for our app.
#
# We start minimal and add features incrementally. Each subsystem added
# here will pull in its own dependencies automatically (Kconfig resolves
# dependencies — e.g., enabling PPP will also enable the networking stack
# it depends on).

# --- Console / Shell ---
# The board defconfig already enables serial + console, but we make it
# explicit here for documentation. USART3 is the console (ST-Link VCP).
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable the Zephyr shell — useful for debugging during bring-up.
# Can be disabled later to save flash.
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# --- Logging ---
# Zephyr's logging system. Supports per-module log levels at runtime.
# Essential for debugging modem communication and state machines.
CONFIG_LOG=y
# INFO level by default (0=none, 1=ERR, 2=WRN, 3=INF, 4=DBG)
CONFIG_LOG_DEFAULT_LEVEL=3

# --- Threading ---
# Zephyr is an RTOS — threading is always available. Preemptive
# scheduling (higher-priority threads interrupt lower ones) is enabled
# automatically when multiple threads with different priorities exist.
# No explicit Kconfig needed — it's derived from the thread setup.
# The phone will rely on this: modem URC handling (high priority)
# must preempt UI rendering (lower priority).

# --- Heap ---
# Some Zephyr APIs (e.g., certain buffer allocations) require a heap.
# We'll need this for modem communication buffers.
CONFIG_HEAP_MEM_POOL_SIZE=4096

# --- Interrupt-driven UART ---
# Enables the UART interrupt API (uart_irq_callback_user_data_set,
# uart_irq_rx_ready, uart_fifo_read). The modem UART uses interrupts
# to receive data asynchronously — the ISR fills a ring buffer so we
# never miss URCs (incoming-call notifications, SMS alerts, etc.)
# that arrive at any time, even while the app is busy doing other work.
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- Main thread stack size ---
# The main thread runs our application code (modem_at, URC monitor,
# call handling). Several functions allocate large local buffers
# (512-byte response buffers, 256-byte line buffers) on the stack.
# Zephyr's default main stack is 1024 bytes — too small, causes
# MPU stack overflow fault. 4096 gives plenty of headroom.
CONFIG_MAIN_STACK_SIZE=4096

# --- Display ---
# Enables the Zephyr display subsystem. The ST7789V driver is
# auto-selected when the devicetree node is enabled (Kconfig.st7789v
# has `default y` + `depends on DT_HAS_SITRONIX_ST7789V_ENABLED`).
CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_ERR=y

# --- LVGL (UI framework) ---
# LVGL provides text labels, buttons, and UI widgets. We use it to
# render phone status text (call state, phone number, signal info).
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384
# 16-bit RGB565 pixel format matches the ST7789V panel config
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_COLOR_DEPTH_16=y
# ST7789V expects swapped byte order for RGB565 over SPI
CONFIG_LV_COLOR_16_SWAP=y
# Enable the widgets we use (labels for text)
CONFIG_LV_USE_LABEL=y
# Font — Montserrat 28 for readable phone status text on 2" screen
CONFIG_LV_FONT_MONTSERRAT_28=y
